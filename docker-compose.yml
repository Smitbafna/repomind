version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: repomind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repomind-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./repomind.db
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      QDRANT_URL: http://qdrant:6333
      REPOSITORIES_BASE_PATH: /app/repositories
    volumes:
      - repomind_data:/app/repositories
      - repomind_db:/app/repomind.db
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
  repomind_data:
  repomind_db: